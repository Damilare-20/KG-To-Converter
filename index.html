<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>KG To Converter</title>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
     <form id="converterform" class="space-y-3">
        <h1 class="text-xl font-bold text-center text-green-600 mb-4">
        KG To Gram Converter
      </h1>
        <input
          type="text"
          id="kgInput"
          class="w-full px-3 py-2 border rounded"
          placeholder="Enter kilograms"
        />

        <button
          class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-700"
        >
          Convert
        </button>

        <p id="result" class="mt-4 text-center font-medium"></p>
      </form>
    </div>
    <script src="converter.js"></script>
  </body>
</html>
